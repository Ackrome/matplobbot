<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="schedule.meta.title">Расписание | ITISHCHENKO</title>
    <!-- Site icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" sizes="192x192" href="/android-chrome-192x192.png">
    <link rel="icon" sizes="512x512" href="/android-chrome-512x512.png">
    <link rel="manifest" href="/site.webmanifest">
    <script src="/js/theme_bootstrap.js?v=1"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="/css/tailwind.css?v=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            color-scheme: light;
            --schedule-page-bg: #f8fafc;
            --schedule-text: #0f172a;
            --schedule-muted: #64748b;
            --schedule-panel: #ffffff;
            --schedule-panel-soft: #f8fafc;
            --schedule-panel-border: #e2e8f0;
            --schedule-grid-bg: #ffffff;
            --schedule-grid-head: #f1f5f9;
            --schedule-grid-time: #f8fafc;
            --schedule-grid-cell: #ffffff;
            --schedule-grid-hover: #f8fafc;
            --schedule-grid-today: #eff6ff;
            --schedule-grid-today-strong: #dbeafe;
            --schedule-grid-border: #e2e8f0;
            --schedule-grid-text: #0f172a;
            --schedule-grid-muted: #64748b;
            --schedule-card-shadow: 0 16px 32px -28px rgba(15, 23, 42, 0.45);
            --schedule-active-control-bg: #0f172a;
            --schedule-active-control-text: #ffffff;
            --lesson-lecture-bg: #ecfdf5;
            --lesson-lecture-border: #86efac;
            --lesson-lecture-text: #047857;
            --lesson-seminar-bg: #fffbeb;
            --lesson-seminar-border: #fcd34d;
            --lesson-seminar-text: #b45309;
            --lesson-exam-bg: #fff1f2;
            --lesson-exam-border: #fda4af;
            --lesson-exam-text: #be123c;
            --lesson-default-bg: #eff6ff;
            --lesson-default-border: #93c5fd;
            --lesson-default-text: #1d4ed8;
        }
        html.dark,
        html[data-theme="dark"] {
            color-scheme: dark;
            --schedule-page-bg: #0b1120;
            --schedule-text: #e5edf7;
            --schedule-muted: #94a3b8;
            --schedule-panel: #0f172a;
            --schedule-panel-soft: #111c2f;
            --schedule-panel-border: rgba(148, 163, 184, 0.22);
            --schedule-grid-bg: #111827;
            --schedule-grid-head: #152238;
            --schedule-grid-time: #101827;
            --schedule-grid-cell: #142033;
            --schedule-grid-hover: #1b2a42;
            --schedule-grid-today: #1d2f4f;
            --schedule-grid-today-strong: #38bdf8;
            --schedule-grid-border: rgba(148, 163, 184, 0.28);
            --schedule-grid-text: #e5edf7;
            --schedule-grid-muted: #9db1ca;
            --schedule-card-shadow: none;
            --schedule-active-control-bg: #22304a;
            --schedule-active-control-text: #ffffff;
            --lesson-lecture-bg: #12383d;
            --lesson-lecture-border: #0f766e;
            --lesson-lecture-text: #5eead4;
            --lesson-seminar-bg: #312a36;
            --lesson-seminar-border: #7c3f36;
            --lesson-seminar-text: #fde047;
            --lesson-exam-bg: #361f2b;
            --lesson-exam-border: #9f1239;
            --lesson-exam-text: #fda4af;
            --lesson-default-bg: #1c2a3f;
            --lesson-default-border: #475569;
            --lesson-default-text: #bfdbfe;
        }
        body { font-family: 'Inter', sans-serif; }
        html[data-theme] body.schedule-page {
            background: var(--schedule-page-bg) !important;
            color: var(--schedule-text) !important;
            transition: background-color .2s ease, color .2s ease;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .skeleton { background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        html.dark .skeleton { background: linear-gradient(90deg, #0f172a 25%, #1e293b 50%, #0f172a 75%); background-size: 200% 100%; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        /* Стили универсальной шапки */
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.3); }
        html.dark .glass { background: rgba(15, 23, 42, 0.8); border-bottom: 1px solid rgba(30, 41, 59, 0.8); }
        html[data-theme] .schedule-shell {
            background: var(--schedule-panel) !important;
            border-color: var(--schedule-panel-border) !important;
            color: var(--schedule-text) !important;
        }
        html[data-theme] .schedule-control-panel {
            background: var(--schedule-panel) !important;
        }
        html[data-theme] .schedule-control-band {
            background: var(--schedule-panel-soft) !important;
            border-color: var(--schedule-panel-border) !important;
        }
        html[data-theme] .schedule-grid-surface {
            background: var(--schedule-grid-bg) !important;
        }
        .schedule-table-wrap {
            background: var(--schedule-grid-bg);
            color: var(--schedule-grid-text);
        }
        .schedule-desktop-table {
            background: var(--schedule-grid-bg);
            color: var(--schedule-grid-text);
        }
        .schedule-table-head {
            background: var(--schedule-grid-head);
            border-bottom: 1px solid var(--schedule-grid-border);
        }
        .schedule-table-head th,
        .schedule-table-body tr,
        .schedule-time-cell,
        .schedule-slot-cell {
            border-color: var(--schedule-grid-border);
        }
        .schedule-table-body tr {
            border-top: 1px solid var(--schedule-grid-border);
        }
        .schedule-day-head {
            background: var(--schedule-grid-head);
        }
        .schedule-day-head.is-today {
            background: var(--schedule-grid-today);
        }
        .schedule-today-marker {
            background: var(--schedule-grid-today-strong);
        }
        .schedule-time-cell {
            background: var(--schedule-grid-time);
        }
        .schedule-time-start,
        .schedule-day-number {
            color: var(--schedule-grid-text);
        }
        .schedule-time-end,
        .schedule-day-label {
            color: var(--schedule-grid-muted);
        }
        .schedule-slot-cell {
            background: var(--schedule-grid-cell);
        }
        .schedule-slot-cell.is-today {
            background: var(--schedule-grid-today);
        }
        .schedule-slot-cell:hover {
            background: var(--schedule-grid-hover);
        }
        .lesson-card {
            background: var(--lesson-default-bg);
            border-color: var(--lesson-default-border);
            color: var(--schedule-grid-text);
            box-shadow: var(--schedule-card-shadow);
        }
        .lesson-card--lecture {
            background: var(--lesson-lecture-bg);
            border-color: var(--lesson-lecture-border);
        }
        .lesson-card--seminar {
            background: var(--lesson-seminar-bg);
            border-color: var(--lesson-seminar-border);
        }
        .lesson-card--exam {
            background: var(--lesson-exam-bg);
            border-color: var(--lesson-exam-border);
        }
        .lesson-kind {
            color: var(--lesson-default-text);
        }
        .lesson-card--lecture .lesson-kind {
            color: var(--lesson-lecture-text);
        }
        .lesson-card--seminar .lesson-kind {
            color: var(--lesson-seminar-text);
        }
        .lesson-card--exam .lesson-kind {
            color: var(--lesson-exam-text);
        }
        .lesson-title,
        .lesson-meta {
            color: var(--schedule-grid-text);
        }
        .lesson-module {
            background: color-mix(in srgb, var(--schedule-panel) 82%, transparent);
            border-color: var(--schedule-panel-border);
            color: var(--schedule-muted);
        }
        .schedule-feed-card-kind.lesson-card {
            box-shadow: none;
        }
        .schedule-view-active {
            background: var(--schedule-active-control-bg);
            color: var(--schedule-active-control-text);
        }
        .schedule-view-idle {
            color: var(--schedule-muted);
        }
        .nav-hidden { transform: translateY(-100%); opacity: 0; }
        .nav-visible { transform: translateY(0); opacity: 1; }
        .mpb-switch {
            position: relative;
            display: inline-flex;
            align-items: center;
        }
        .mpb-switch-track {
            display: block;
            width: 2.75rem;
            height: 1.5rem;
            border-radius: 9999px;
            background: #e2e8f0;
            border: 1px solid #cbd5e1;
            transition: background-color .22s ease, border-color .22s ease, box-shadow .22s ease;
        }
        .mpb-switch-thumb {
            position: absolute;
            top: 0.2rem;
            left: 0.2rem;
            width: 1.05rem;
            height: 1.05rem;
            border-radius: 9999px;
            background: #ffffff;
            box-shadow: 0 1px 3px rgba(15, 23, 42, 0.25);
            transition: transform .22s cubic-bezier(.34, 1.56, .64, 1), box-shadow .22s ease;
        }
        .mpb-switch-input:checked + .mpb-switch-track {
            background: linear-gradient(135deg, #2563eb, #4f46e5);
            border-color: #1d4ed8;
            box-shadow: 0 4px 12px -7px rgba(37, 99, 235, 0.9);
        }
        .mpb-switch-input:checked + .mpb-switch-track + .mpb-switch-thumb {
            transform: translateX(1.25rem);
            box-shadow: 0 2px 8px rgba(29, 78, 216, 0.35);
        }
        .mpb-switch-input:focus-visible + .mpb-switch-track {
            outline: 2px solid #93c5fd;
            outline-offset: 2px;
        }
        html.tg-webapp body.schedule-page {
            background: var(--tg-theme-bg-color, var(--schedule-page-bg)) !important;
            color: var(--tg-theme-text-color, var(--schedule-text)) !important;
            overscroll-behavior-y: contain;
        }
        html.tg-webapp #navbar {
            display: none;
        }
        html.tg-webapp main {
            max-width: none;
            padding-top: calc(env(safe-area-inset-top) + 0.75rem);
            padding-bottom: calc(env(safe-area-inset-bottom) + 1rem);
        }
        html.tg-webapp .schedule-shell {
            border-radius: 1.25rem;
            box-shadow: none;
        }
        html.tg-webapp #offlineDropdown,
        html.tg-webapp #searchResults {
            max-height: min(20rem, 55vh);
        }
    </style>
</head>
<body class="schedule-page bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-100">
    <!-- UNIVERSAL HEADER -->
    <nav class="glass fixed top-0 w-full z-50 transition-all duration-300 nav-visible" id="navbar">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <a href="/" class="flex-shrink-0 flex items-center space-x-2 group">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-600 to-indigo-600 flex items-center justify-center text-white font-bold text-lg shadow-lg shadow-blue-500/30 group-hover:scale-105 transition-transform">IT</div>
                    <span class="text-lg font-bold text-slate-800 dark:text-slate-100">Ivan Tishchenko</span>
                </a>
                <div class="hidden md:flex space-x-8 items-center" id="desktop-nav-links">
                    <a href="/#projects" class="text-slate-600 font-medium hover:text-blue-600 transition-colors dark:text-slate-300 dark:hover:text-blue-300">Проекты</a>
                    <a href="/schedule" class="text-slate-600 font-medium hover:text-blue-600 transition-colors dark:text-slate-300 dark:hover:text-blue-300">Расписание</a>
                    <div id="desktop-auth-container" class="flex items-center gap-4">
                        <a href="/login" class="group relative px-6 py-2.5 bg-slate-900 text-white rounded-full font-medium overflow-hidden shadow-lg shadow-slate-900/20 hover:shadow-slate-900/40 transition-all">
                            <span class="relative z-10 flex items-center gap-2">Авторизация</span>
                            <div class="absolute inset-0 bg-gradient-to-r from-blue-600 to-indigo-600 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                        </a>
                    </div>
                </div>
                <div class="md:hidden flex items-center">
                    <button id="mobile-menu-button" data-i18n-aria-label="nav.menu" class="text-slate-600 hover:text-blue-600 focus:outline-none p-2 rounded-lg hover:bg-slate-100 transition-colors dark:text-slate-300 dark:hover:bg-slate-800 dark:hover:text-blue-300">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" /></svg>
                    </button>
                </div>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-white border-t border-slate-100 absolute w-full shadow-xl dark:border-slate-800 dark:bg-slate-900">
            <div class="px-4 pt-2 pb-6 space-y-1" id="mobile-nav-links">
                <a href="/#projects" class="block px-3 py-3 rounded-lg text-base font-medium text-slate-700 hover:text-blue-600 hover:bg-blue-50 transition-colors dark:text-slate-300 dark:hover:bg-slate-800 dark:hover:text-blue-300">Проекты</a>
                <a href="/schedule" class="block px-3 py-3 rounded-lg text-base font-medium text-slate-700 hover:text-blue-600 hover:bg-blue-50 transition-colors dark:text-slate-300 dark:hover:bg-slate-800 dark:hover:text-blue-300">Расписание</a>
                <div id="mobile-auth-container">
                    <a href="/login" class="block mt-4 px-3 py-3 rounded-lg text-base font-medium text-center bg-blue-600 text-white hover:bg-blue-700 transition-colors">Авторизация</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- КОНТЕНТ -->
    <main class="pt-24 max-w-[1600px] mx-auto px-2 sm:px-6 lg:px-8 pb-20">
        <div class="w-full">
            <div class="flex flex-col md:flex-row justify-between items-center mb-4 md:mb-6 gap-3 relative z-40 w-full px-1">
                <div class="flex items-center justify-between w-full md:w-auto gap-3">
                    <h1 data-i18n="schedule.heading" class="text-2xl md:text-4xl font-black text-slate-900 tracking-tight dark:text-slate-100">Расписание</h1>
                    <div class="relative" id="offlinePanelContainer">
                        <button onclick="toggleOfflinePanel(event)"
                            class="group flex items-center gap-1.5 px-3 py-2 bg-white border border-slate-200 rounded-xl shadow-sm hover:border-blue-400 transition-all dark:border-slate-700 dark:bg-slate-800">
                            <div class="relative flex h-2 w-2">
                                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                                <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                            </div>
                            <span data-i18n="schedule.offline.available" class="text-xs md:text-sm font-bold text-slate-600 dark:text-slate-300">Доступно оффлайн</span>
                            <svg id="offlineArrow" class="w-4 h-4 text-slate-400 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </button>
                        <div id="offlineDropdown"
                            class="absolute right-0 md:left-0 mt-2 w-64 md:w-72 bg-white border border-slate-100 rounded-2xl shadow-2xl overflow-hidden hidden opacity-0 translate-y-2 transition-all duration-200 z-50 dark:border-slate-700 dark:bg-slate-800">
                            <div class="p-3 border-b border-slate-50 bg-slate-50/50 dark:border-slate-700 dark:bg-slate-900/50">
                                <h3 data-i18n="schedule.offline.available" class="font-black text-[10px] text-slate-400 uppercase tracking-wider text-center">Доступно оффлайн</h3>
                            </div>
                            <div id="cachedEntitiesList" class="p-1.5 flex flex-col gap-1 max-h-80 overflow-y-auto custom-scrollbar"></div>
                        </div>
                    </div>
                </div>
                <div class="relative w-full md:w-96" id="searchContainer">
                    <input type="text" id="groupSearch" data-search-input data-i18n-placeholder="schedule.search.placeholder" autocomplete="off"
                        class="w-full pl-11 pr-4 py-3 bg-white border border-slate-200 rounded-xl shadow-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all font-medium text-slate-700 text-sm md:text-base dark:border-slate-700 dark:bg-slate-800 dark:text-slate-100 dark:placeholder:text-slate-500"
                        placeholder="Найти группу или ФИО...">
                    <div class="absolute left-3.5 top-3 text-slate-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    </div>
                    <div id="searchResults" class="absolute w-full mt-2 bg-white border border-slate-100 rounded-xl shadow-2xl overflow-hidden hidden max-h-80 overflow-y-auto custom-scrollbar z-50 dark:border-slate-700 dark:bg-slate-800"></div>
                </div>
            </div>
            <section id="calendarSubscriptionSection" class="hidden mb-4 md:mb-6"></section>

            <!-- ГЛАВНЫЙ БЛОК РАСПИСАНИЯ -->
            <div id="mainScheduleBlock" class="schedule-shell bg-white rounded-3xl md:rounded-[2.5rem] border border-slate-200 shadow-sm overflow-hidden flex flex-col w-full min-h-[500px] dark:border-slate-700 dark:bg-slate-800">

                <div id="scheduleControls" class="schedule-control-panel hidden flex flex-col bg-white dark:bg-slate-800">
                    <!-- Верхний ряд: Название + Meta (Icon) + Вид -->
                    <div class="flex items-center justify-between p-4 md:px-6 md:py-4 border-b border-slate-100 dark:border-slate-700">
                        <div class="flex items-center gap-3">
                            <span class="font-black text-slate-800 text-xl md:text-2xl dark:text-slate-100" id="contextEntity">-</span>
                            <div class="relative group cursor-help flex items-center justify-center w-7 h-7 rounded-full bg-slate-100 hover:bg-slate-200 text-slate-500 transition-colors dark:bg-slate-700 dark:text-slate-300 dark:hover:bg-slate-600">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                <!-- Tooltip -->
                                <div class="absolute left-0 top-full mt-2 w-64 p-3 bg-slate-800 text-white text-xs rounded-xl shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all z-50 pointer-events-none">
                                    <div id="contextRange" class="mb-1 text-slate-300"></div>
                                    <div id="contextParsed" class="font-medium text-blue-300"></div>
                                </div>
                            </div>
                        </div>
                        <div class="hidden md:flex items-center rounded-xl border border-slate-200 bg-slate-50 p-1 text-xs dark:border-slate-700 dark:bg-slate-900">
                            <button type="button" id="viewAutoBtn" class="rounded-lg px-3 py-1.5 font-bold text-slate-700 transition-colors">Авто</button>
                            <button type="button" id="viewTableBtn" class="rounded-lg px-3 py-1.5 font-bold text-slate-700 transition-colors">Таблица</button>
                            <button type="button" id="viewCardsBtn" class="rounded-lg px-3 py-1.5 font-bold text-slate-700 transition-colors">Карточки</button>
                        </div>
                    </div>

                    <!-- Нижний ряд: Навигация + Фильтры -->
                    <div class="schedule-control-band flex flex-col sm:flex-row sm:items-center justify-between p-4 md:px-6 md:py-4 gap-4 border-b border-slate-100 bg-slate-50/30 dark:border-slate-700 dark:bg-slate-900/40">
                        <div class="flex items-center gap-2">
                            <button onclick="changeWeek(-1)" class="p-2.5 bg-white hover:bg-slate-50 rounded-xl text-slate-600 shadow-sm border border-slate-200 transition-colors dark:border-slate-700 dark:bg-slate-800 dark:text-slate-300 dark:hover:bg-slate-700">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            </button>
                            <div class="text-sm font-bold text-slate-800 text-center min-w-[130px] md:min-w-[160px] dark:text-slate-100" id="weekRangeDisplay"></div>
                            <button onclick="changeWeek(1)" class="p-2.5 bg-white hover:bg-slate-50 rounded-xl text-slate-600 shadow-sm border border-slate-200 transition-colors dark:border-slate-700 dark:bg-slate-800 dark:text-slate-300 dark:hover:bg-slate-700">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                            </button>
                            <button onclick="setTodayWeek()" data-i18n="schedule.today" class="ml-2 px-4 py-2.5 text-sm font-bold bg-white hover:bg-blue-50 text-blue-600 transition-colors rounded-xl border border-blue-100 shadow-sm hidden sm:block dark:border-blue-900/60 dark:bg-slate-800 dark:text-blue-300 dark:hover:bg-slate-700">Сегодня</button>
                        </div>

                        <button type="button" id="filterToggleBtn" class="flex items-center justify-center gap-2 px-4 py-2.5 text-sm font-bold text-slate-700 bg-white hover:bg-slate-50 border border-slate-200 rounded-xl shadow-sm transition-colors w-full sm:w-auto dark:border-slate-700 dark:bg-slate-800 dark:text-slate-200 dark:hover:bg-slate-700">
                            <svg class="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"></path></svg>
                            <span data-i18n="schedule.filters.desktop">Фильтры и модули</span>
                            <svg id="filterArrow" class="w-4 h-4 text-slate-400 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        </button>
                    </div>

                    <!-- Панель фильтров -->
                    <div id="moduleFilterSection" class="schedule-control-band p-4 md:px-6 md:py-5 bg-slate-50 border-b border-slate-100 hidden shadow-inner dark:border-slate-700 dark:bg-slate-900">
                        <div id="filterContent" class="space-y-4">
                            <div class="flex flex-col lg:flex-row lg:items-center justify-between gap-4">
                                <div class="flex flex-wrap items-center gap-5">
                                    <label class="flex items-center cursor-pointer group select-none">
                                        <span class="mpb-switch">
                                            <input type="checkbox" id="useShortNames" class="sr-only mpb-switch-input" checked onchange="filterAndRender(); savePreferences();">
                                            <span class="mpb-switch-track"></span>
                                            <span class="mpb-switch-thumb"></span>
                                        </span>
                                        <span data-i18n="schedule.filters.shortNames" class="ml-2 text-sm font-semibold text-slate-600 group-hover:text-slate-900 transition-colors dark:text-slate-300 dark:group-hover:text-slate-100">Короткие названия</span>
                                    </label>
                                    <label class="flex items-center cursor-pointer group select-none">
                                        <span class="mpb-switch">
                                            <input type="checkbox" id="showFullLecturerName" class="sr-only mpb-switch-input" onchange="filterAndRender(); savePreferences();">
                                            <span class="mpb-switch-track"></span>
                                            <span class="mpb-switch-thumb"></span>
                                        </span>
                                        <span data-i18n="schedule.filters.fullLecturer" class="ml-2 text-sm font-semibold text-slate-600 group-hover:text-slate-900 transition-colors dark:text-slate-300 dark:group-hover:text-slate-100">ФИО полностью</span>
                                    </label>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="selectAllModules()" data-i18n="schedule.filters.all" class="px-3 py-1.5 rounded-lg text-xs font-bold bg-blue-100 text-blue-700 hover:bg-blue-200 transition-colors uppercase">Всё</button>
                                    <button onclick="clearAllModules()" data-i18n="schedule.filters.clear" class="px-3 py-1.5 rounded-lg text-xs font-bold bg-slate-200 text-slate-600 hover:bg-slate-300 transition-colors uppercase dark:bg-slate-700 dark:text-slate-300 dark:hover:bg-slate-600">Сброс</button>
                                </div>
                            </div>
                            <div id="moduleContainer" class="flex flex-wrap gap-2"></div>
                        </div>
                    </div>
                </div>

                <div id="scheduleGridContent" class="schedule-grid-surface relative bg-white flex-grow dark:bg-slate-800">
                    <div id="offlineWarning" class="hidden m-3 p-3 bg-amber-50 border border-amber-100 rounded-xl flex items-center gap-2 text-amber-800 fade-in">
                        <svg class="w-4 h-4 text-amber-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        <span data-i18n="schedule.offline.warning" class="text-xs md:text-sm font-medium">ВУЗ недоступен. Загружена сохраненная копия.</span>
                    </div>
                    <div id="desktopSchedule" class="hidden lg:block w-full"></div>
                    <div id="mobileSchedule" class="block lg:hidden flex flex-col gap-0 schedule-cards-feed"></div>

                    <div id="defaultState" class="text-center py-24 px-4">
                        <div class="w-16 h-16 bg-slate-50 text-slate-200 rounded-full flex items-center justify-center mx-auto mb-4 dark:bg-slate-900 dark:text-slate-600">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        </div>
                        <h3 data-i18n="schedule.state.default" class="text-base font-bold text-slate-400 tracking-tight">Выберите расписание</h3>
                    </div>
                </div>
            </div>        </div>
    </main>
