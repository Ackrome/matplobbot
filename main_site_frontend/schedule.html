<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="schedule.meta.title">Расписание | ITISHCHENKO</title>
    <!-- Site icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" sizes="192x192" href="/android-chrome-192x192.png">
    <link rel="icon" sizes="512x512" href="/android-chrome-512x512.png">
    <link rel="manifest" href="/site.webmanifest">
    <script src="/js/theme_bootstrap.js?v=1"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="/css/tailwind.css?v=6">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            color-scheme: light;
            --schedule-page-bg: #f8fafc;
            --schedule-text: #0f172a;
            --schedule-muted: #64748b;
            --schedule-panel: #ffffff;
            --schedule-panel-soft: #f8fafc;
            --schedule-panel-border: #e2e8f0;
            --schedule-grid-bg: #ffffff;
            --schedule-grid-head: #f1f5f9;
            --schedule-grid-time: #f8fafc;
            --schedule-grid-cell: #ffffff;
            --schedule-grid-hover: #f8fafc;
            --schedule-grid-today: #eff6ff;
            --schedule-grid-today-strong: #dbeafe;
            --schedule-grid-border: #e2e8f0;
            --schedule-grid-text: #0f172a;
            --schedule-grid-muted: #64748b;
            --schedule-card-shadow: 0 16px 32px -28px rgba(15, 23, 42, 0.45);
            --schedule-active-control-bg: #0f172a;
            --schedule-active-control-text: #ffffff;
            --lesson-lecture-bg: #ecfdf5;
            --lesson-lecture-border: #86efac;
            --lesson-lecture-text: #047857;
            --lesson-seminar-bg: #fffbeb;
            --lesson-seminar-border: #fcd34d;
            --lesson-seminar-text: #b45309;
            --lesson-exam-bg: #fff1f2;
            --lesson-exam-border: #fda4af;
            --lesson-exam-text: #be123c;
            --lesson-default-bg: #eff6ff;
            --lesson-default-border: #93c5fd;
            --lesson-default-text: #1d4ed8;
        }
        html.dark,
        html[data-theme="dark"] {
            color-scheme: dark;
            --schedule-page-bg: #0b1120;
            --schedule-text: #e5edf7;
            --schedule-muted: #94a3b8;
            --schedule-panel: #0f172a;
            --schedule-panel-soft: #111c2f;
            --schedule-panel-border: rgba(148, 163, 184, 0.22);
            --schedule-grid-bg: #111827;
            --schedule-grid-head: #152238;
            --schedule-grid-time: #101827;
            --schedule-grid-cell: #142033;
            --schedule-grid-hover: #1b2a42;
            --schedule-grid-today: #1d2f4f;
            --schedule-grid-today-strong: #38bdf8;
            --schedule-grid-border: rgba(148, 163, 184, 0.28);
            --schedule-grid-text: #e5edf7;
            --schedule-grid-muted: #9db1ca;
            --schedule-card-shadow: none;
            --schedule-active-control-bg: #22304a;
            --schedule-active-control-text: #ffffff;
            --lesson-lecture-bg: #12383d;
            --lesson-lecture-border: #0f766e;
            --lesson-lecture-text: #5eead4;
            --lesson-seminar-bg: #312a36;
            --lesson-seminar-border: #7c3f36;
            --lesson-seminar-text: #fde047;
            --lesson-exam-bg: #361f2b;
            --lesson-exam-border: #9f1239;
            --lesson-exam-text: #fda4af;
            --lesson-default-bg: #1c2a3f;
            --lesson-default-border: #475569;
            --lesson-default-text: #bfdbfe;
        }
        body { font-family: 'Inter', sans-serif; }
        html[data-theme] body.schedule-page {
            background: var(--schedule-page-bg) !important;
            color: var(--schedule-text) !important;
            transition: background-color .2s ease, color .2s ease;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .skeleton { background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        html.dark .skeleton { background: linear-gradient(90deg, #0f172a 25%, #1e293b 50%, #0f172a 75%); background-size: 200% 100%; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        /* Стили универсальной шапки */
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.3); }
        html.dark .glass { background: rgba(15, 23, 42, 0.8); border-bottom: 1px solid rgba(30, 41, 59, 0.8); }
        html[data-theme] .schedule-shell {
            background: var(--schedule-panel) !important;
            border-color: var(--schedule-panel-border) !important;
            color: var(--schedule-text) !important;
        }
        html[data-theme] .schedule-control-panel {
            background: var(--schedule-panel) !important;
        }
        html[data-theme] .schedule-control-band {
            background: var(--schedule-panel-soft) !important;
            border-color: var(--schedule-panel-border) !important;
        }
        html[data-theme] .schedule-grid-surface {
            background: var(--schedule-grid-bg) !important;
        }
        .schedule-table-wrap {
            background: var(--schedule-grid-bg);
            color: var(--schedule-grid-text);
        }
        .schedule-desktop-table {
            background: var(--schedule-grid-bg);
            color: var(--schedule-grid-text);
        }
        .schedule-table-head {
            background: var(--schedule-grid-head);
            border-bottom: 1px solid var(--schedule-grid-border);
        }
        .schedule-table-head th,
        .schedule-table-body tr,
        .schedule-time-cell,
        .schedule-slot-cell {
            border-color: var(--schedule-grid-border);
        }
        .schedule-table-body tr {
            border-top: 1px solid var(--schedule-grid-border);
        }
        .schedule-day-head {
            background: var(--schedule-grid-head);
        }
        .schedule-day-head.is-today {
            background: var(--schedule-grid-today);
        }
        .schedule-today-marker {
            background: var(--schedule-grid-today-strong);
        }
        .schedule-time-cell {
            background: var(--schedule-grid-time);
        }
        .schedule-time-start,
        .schedule-day-number {
            color: var(--schedule-grid-text);
        }
        .schedule-time-end,
        .schedule-day-label {
            color: var(--schedule-grid-muted);
        }
        .schedule-slot-cell {
            background: var(--schedule-grid-cell);
        }
        .schedule-slot-cell.is-today {
            background: var(--schedule-grid-today);
        }
        .schedule-slot-cell:hover {
            background: var(--schedule-grid-hover);
        }
        .lesson-card {
            background: var(--lesson-default-bg);
            border-color: var(--lesson-default-border);
            color: var(--schedule-grid-text);
            box-shadow: var(--schedule-card-shadow);
        }
        .lesson-card--lecture {
            background: var(--lesson-lecture-bg);
            border-color: var(--lesson-lecture-border);
        }
        .lesson-card--seminar {
            background: var(--lesson-seminar-bg);
            border-color: var(--lesson-seminar-border);
        }
        .lesson-card--exam {
            background: var(--lesson-exam-bg);
            border-color: var(--lesson-exam-border);
        }
        .lesson-kind {
            color: var(--lesson-default-text);
        }
        .lesson-card--lecture .lesson-kind {
            color: var(--lesson-lecture-text);
        }
        .lesson-card--seminar .lesson-kind {
            color: var(--lesson-seminar-text);
        }
        .lesson-card--exam .lesson-kind {
            color: var(--lesson-exam-text);
        }
        .lesson-title,
        .lesson-meta {
            color: var(--schedule-grid-text);
        }
        .lesson-module {
            background: color-mix(in srgb, var(--schedule-panel) 82%, transparent);
            border-color: var(--schedule-panel-border);
            color: var(--schedule-muted);
        }
        .lesson-actions {
            margin-top: 0.75rem;
        }
        .lesson-actions--compact {
            margin-top: 0.5rem;
        }
        .lesson-actions-toggle {
            display: inline-flex;
            min-height: 2rem;
            max-width: 100%;
            cursor: pointer;
            user-select: none;
            align-items: center;
            justify-content: center;
            gap: 0.375rem;
            border: 1px solid var(--schedule-panel-border);
            border-radius: 0.5rem;
            background: color-mix(in srgb, var(--schedule-panel) 90%, transparent);
            color: var(--schedule-grid-text);
            padding: 0.25rem 0.625rem;
            font-size: 0.625rem;
            font-weight: 900;
            line-height: 1.15;
            transition: background-color 0.16s ease, border-color 0.16s ease, color 0.16s ease;
        }
        .lesson-actions-toggle::-webkit-details-marker {
            display: none;
        }
        .lesson-actions-toggle::marker {
            content: "";
        }
        .lesson-actions-toggle:hover {
            border-color: var(--lesson-default-border);
            background: color-mix(in srgb, var(--schedule-panel) 74%, var(--lesson-default-bg));
        }
        .lesson-actions-panel {
            display: none;
            flex-wrap: wrap;
            gap: 0.375rem;
            margin-top: 0.5rem;
        }
        .lesson-actions-panel--inline {
            display: flex;
            gap: 0.375rem;
            margin-top: 0.7rem;
        }
        .lesson-actions-panel--inline .lesson-action-btn {
            min-height: 1.9rem;
        }
        .lesson-actions[open] .lesson-actions-panel {
            display: flex;
        }
        .lesson-actions-open-label {
            display: none;
        }
        .lesson-actions[open] .lesson-actions-open-label {
            display: inline;
        }
        .lesson-actions[open] .lesson-actions-closed-label {
            display: none;
        }
        .lesson-actions-chevron {
            display: inline-flex;
            transition: transform 0.16s ease;
        }
        .lesson-actions[open] .lesson-actions-chevron {
            transform: rotate(180deg);
        }
        .schedule-setting-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.85rem;
            min-height: 4rem;
            border: 1px solid var(--schedule-panel-border);
            border-radius: 1rem;
            background: color-mix(in srgb, var(--schedule-panel) 92%, transparent);
            padding: 0.9rem 1rem;
            transition: border-color .18s ease, background-color .18s ease, box-shadow .18s ease;
        }
        .schedule-setting-card:hover {
            border-color: color-mix(in srgb, var(--lesson-default-border) 60%, var(--schedule-panel-border));
            background: color-mix(in srgb, var(--schedule-panel) 82%, var(--lesson-default-bg));
            box-shadow: 0 14px 30px -26px rgba(37, 99, 235, 0.55);
        }
        .schedule-setting-card-label {
            color: var(--schedule-text);
        }
        .schedule-setting-card-hint {
            color: var(--schedule-muted);
        }
        #calendarSubscriptionBackdrop {
            position: fixed;
            inset: 0;
            z-index: 70;
            background: rgba(15, 23, 42, 0.3);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            backdrop-filter: blur(4px);
        }
        #calendarSubscriptionBackdrop.is-open {
            opacity: 1;
            pointer-events: auto;
        }
        .schedule-shell-layout {
            position: relative;
            overflow: visible;
        }
        .schedule-workspace {
            min-height: inherit;
        }
        .schedule-primary-column {
            min-width: 0;
        }
        .schedule-toolbar-kicker {
            color: var(--schedule-muted);
        }
        .schedule-entity-trigger,
        .schedule-ghost-button {
            border: 1px solid var(--schedule-panel-border);
            background: color-mix(in srgb, var(--schedule-panel) 94%, transparent);
            color: var(--schedule-text);
            transition: border-color .18s ease, background-color .18s ease, color .18s ease, box-shadow .18s ease;
        }
        .schedule-entity-trigger:hover,
        .schedule-ghost-button:hover {
            border-color: color-mix(in srgb, var(--lesson-default-border) 55%, var(--schedule-panel-border));
            background: color-mix(in srgb, var(--schedule-panel) 82%, var(--lesson-default-bg));
            box-shadow: 0 16px 30px -28px rgba(37, 99, 235, 0.55);
        }
        .schedule-entity-trigger:focus-within,
        .schedule-ghost-button:focus-visible {
            outline: 2px solid #93c5fd;
            outline-offset: 2px;
        }
        .schedule-entity-trigger input::placeholder {
            color: var(--schedule-muted);
        }
        .schedule-inline-toggle {
            display: inline-flex;
            align-items: center;
            gap: 0.65rem;
            min-height: 2.75rem;
            border: 1px solid var(--schedule-panel-border);
            border-radius: 999px;
            background: color-mix(in srgb, var(--schedule-panel) 94%, transparent);
            padding: 0.4rem 0.55rem 0.4rem 0.85rem;
            transition: border-color .18s ease, background-color .18s ease, box-shadow .18s ease;
        }
        .schedule-inline-toggle:hover {
            border-color: color-mix(in srgb, var(--lesson-default-border) 55%, var(--schedule-panel-border));
            background: color-mix(in srgb, var(--schedule-panel) 82%, var(--lesson-default-bg));
            box-shadow: 0 16px 30px -28px rgba(37, 99, 235, 0.55);
        }
        .schedule-inline-toggle-label {
            color: var(--schedule-text);
        }
        .schedule-inline-toggle-hint {
            color: var(--schedule-muted);
        }
        .schedule-utility-cluster {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.35rem;
            border: 1px solid var(--schedule-panel-border);
            border-radius: 1rem;
            background: color-mix(in srgb, var(--schedule-panel) 94%, transparent);
            box-shadow: 0 16px 30px -28px rgba(37, 99, 235, 0.45);
        }
        .schedule-utility-button {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.45rem;
            min-width: 2.75rem;
            min-height: 2.75rem;
            padding: 0.7rem;
            border-radius: 0.9rem;
            color: var(--schedule-muted);
            transition: color .18s ease, background-color .18s ease, box-shadow .18s ease, transform .18s ease;
        }
        .schedule-utility-button:hover {
            color: var(--schedule-text);
            background: color-mix(in srgb, var(--schedule-panel-soft) 88%, transparent);
            box-shadow: 0 12px 24px -22px rgba(15, 23, 42, 0.4);
            transform: translateY(-1px);
        }
        .schedule-utility-button:focus-visible {
            outline: 2px solid #93c5fd;
            outline-offset: 2px;
        }
        .schedule-utility-button:disabled {
            cursor: not-allowed;
            opacity: 0.45;
            box-shadow: none;
            transform: none;
        }
        .schedule-utility-button--wide {
            padding-inline: 0.9rem;
        }
        .schedule-utility-button.is-active {
            color: #b45309;
            background: #fffbeb;
        }
        .schedule-utility-button.is-favorite {
            color: #b45309;
            background: #fef3c7;
        }
        .schedule-utility-badge {
            position: absolute;
            top: 0.3rem;
            right: 0.3rem;
            min-width: 1rem;
            height: 1rem;
            padding: 0 0.22rem;
            border-radius: 999px;
            background: #2563eb;
            color: #ffffff;
            font-size: 0.6rem;
            font-weight: 900;
            line-height: 1rem;
            text-align: center;
            box-shadow: 0 6px 16px -10px rgba(37, 99, 235, 0.9);
        }
        .dark .schedule-utility-button.is-active {
            color: #fdba74;
            background: rgba(120, 53, 15, 0.3);
        }
        .dark .schedule-utility-button.is-favorite {
            color: #fbbf24;
            background: rgba(120, 53, 15, 0.45);
        }
        #calendarSubscriptionSection.calendar-sync-drawer {
            position: fixed;
            top: 1rem;
            right: 1rem;
            bottom: 1rem;
            z-index: 80;
            width: min(30rem, calc(100vw - 1rem));
            overflow-y: auto;
            padding: 0;
            pointer-events: auto;
            transform: translateX(var(--calendar-sync-drawer-offset, 100%));
            opacity: 1;
            transition: transform 0.22s ease;
        }
        #calendarSubscriptionSection.calendar-sync-drawer.is-open {
            transform: translateX(0);
        }
        #calendarSubscriptionSection.calendar-sync-drawer.is-dragging {
            transition: none;
        }
        #calendarSubscriptionSection.calendar-sync-drawer.hidden {
            display: none;
        }
        #calendarSubscriptionSection .calendar-sync-card {
            min-height: 100%;
            border-radius: 1.75rem;
            box-shadow: 0 24px 70px -26px rgba(15, 23, 42, 0.55);
        }
        .schedule-feed-card-kind.lesson-card {
            box-shadow: none;
        }
        .schedule-view-active {
            background: var(--schedule-active-control-bg);
            color: var(--schedule-active-control-text);
        }
        .schedule-view-idle {
            color: var(--schedule-muted);
        }
        .nav-hidden { transform: translateY(-100%); opacity: 0; }
        .nav-visible { transform: translateY(0); opacity: 1; }
        .mpb-switch {
            position: relative;
            display: inline-flex;
            align-items: center;
        }
        .mpb-switch-track {
            display: block;
            width: 2.75rem;
            height: 1.5rem;
            border-radius: 9999px;
            background: #e2e8f0;
            border: 1px solid #cbd5e1;
            transition: background-color .22s ease, border-color .22s ease, box-shadow .22s ease;
        }
        .mpb-switch-thumb {
            position: absolute;
            top: 0.2rem;
            left: 0.2rem;
            width: 1.05rem;
            height: 1.05rem;
            border-radius: 9999px;
            background: #ffffff;
            box-shadow: 0 1px 3px rgba(15, 23, 42, 0.25);
            transition: transform .22s cubic-bezier(.34, 1.56, .64, 1), box-shadow .22s ease;
        }
        .mpb-switch-input:checked + .mpb-switch-track {
            background: linear-gradient(135deg, #2563eb, #4f46e5);
            border-color: #1d4ed8;
            box-shadow: 0 4px 12px -7px rgba(37, 99, 235, 0.9);
        }
        .mpb-switch-input:checked + .mpb-switch-track + .mpb-switch-thumb {
            transform: translateX(1.25rem);
            box-shadow: 0 2px 8px rgba(29, 78, 216, 0.35);
        }
        .mpb-switch-input:focus-visible + .mpb-switch-track {
            outline: 2px solid #93c5fd;
            outline-offset: 2px;
        }
        html.tg-webapp body.schedule-page {
            background: var(--tg-theme-bg-color, var(--schedule-page-bg)) !important;
            color: var(--tg-theme-text-color, var(--schedule-text)) !important;
            overscroll-behavior-y: contain;
        }
        html.tg-webapp #navbar {
            display: none;
        }
        html.tg-webapp main {
            max-width: none;
            padding-top: calc(env(safe-area-inset-top) + 0.75rem);
            padding-bottom: calc(env(safe-area-inset-bottom) + 1rem);
        }
        html.tg-webapp .schedule-shell {
            border-radius: 1.25rem;
            box-shadow: none;
        }
        html.tg-webapp #calendarSubscriptionSection.calendar-sync-drawer {
            top: calc(env(safe-area-inset-top) + 0.5rem);
            right: 0.5rem;
            bottom: calc(env(safe-area-inset-bottom) + 0.5rem);
            width: min(30rem, calc(100vw - 1rem));
        }
        html.tg-webapp #offlineDropdown,
        html.tg-webapp #searchResults {
            max-height: min(20rem, 55vh);
        }
        @media (max-width: 767px) {
            .schedule-setting-card {
                min-height: 3.6rem;
                padding: 0.85rem 0.95rem;
            }
            .schedule-utility-cluster {
                width: 100%;
                justify-content: flex-end;
            }
            #calendarSubscriptionSection.calendar-sync-drawer {
                top: auto;
                right: 0.5rem;
                bottom: 0.5rem;
                left: 0.5rem;
                width: auto;
            }
            #calendarSubscriptionSection .calendar-sync-card {
                border-radius: 1.4rem;
            }
        }
        @media (min-width: 1280px) {
            .schedule-shell--calendar-open .schedule-workspace {
                display: grid;
                grid-template-columns: minmax(0, 1fr) minmax(22rem, 24rem);
                align-items: start;
            }
            .schedule-shell--calendar-open #calendarSubscriptionSection.calendar-sync-drawer {
                position: sticky;
                top: 6rem;
                right: auto;
                bottom: auto;
                width: auto;
                align-self: start;
                max-height: calc(100vh - 7rem);
                overflow-y: auto;
                overscroll-behavior: contain;
                scrollbar-gutter: stable;
                transform: none !important;
                padding: 0;
                border-left: 1px solid var(--schedule-panel-border);
                background: color-mix(in srgb, var(--schedule-panel-soft) 90%, transparent);
            }
            .schedule-shell--calendar-open #calendarSubscriptionSection .calendar-sync-card {
                min-height: auto;
                border: 0;
                border-radius: 0 2rem 2rem 0;
                box-shadow: none;
            }
            #calendarSubscriptionBackdrop {
                display: none !important;
            }
        }
    </style>
</head>
<body class="schedule-page bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-100">
    <!-- UNIVERSAL HEADER -->
    <nav class="glass fixed top-0 w-full z-50 transition-all duration-300 nav-visible" id="navbar">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <a href="/" class="flex-shrink-0 flex items-center space-x-2 group">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-600 to-indigo-600 flex items-center justify-center text-white font-bold text-lg shadow-lg shadow-blue-500/30 group-hover:scale-105 transition-transform">IT</div>
                    <span class="text-lg font-bold text-slate-800 dark:text-slate-100">Ivan Tishchenko</span>
                </a>
                <div class="hidden md:flex space-x-8 items-center" id="desktop-nav-links">
