<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расписание | ITISHCHENKO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Кастомный скроллбар для таблицы */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f8fafc; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Анимация появления */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    
    <!-- Navbar (Твоя стандартная навигация) -->
    <nav class="fixed top-0 w-full bg-white/80 backdrop-blur-md border-b border-slate-200 z-50 h-16 flex items-center px-6">
        <a href="/" class="font-bold text-lg flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-600 rounded-lg text-white flex items-center justify-center">IT</div>
            Ivan Tishchenko
        </a>
    </nav>

    <main class="pt-24 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-20">
        <!-- Шапка и Поиск -->
        <div class="flex flex-col lg:flex-row justify-between items-start lg:items-end mb-8 gap-6 relative z-40">
            <div>
                <h1 class="text-4xl md:text-5xl font-black text-slate-900 tracking-tight mb-2">Расписание</h1>
                <p class="text-slate-500 font-medium">Умный поиск по группам и преподавателям</p>
            </div>
            
            <div class="relative w-full lg:w-96" id="searchContainer">
                <input type="text" id="groupSearch" autocomplete="off"
                    class="w-full pl-12 pr-4 py-3.5 bg-white border border-slate-200 rounded-2xl shadow-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all text-slate-700 font-medium placeholder-slate-400" 
                    placeholder="Например: ПМ23-1 или Иванов...">
                <div class="absolute left-4 top-3.5 text-slate-400">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                </div>
                <!-- Результаты поиска -->
                <div id="searchResults" class="absolute w-full mt-2 bg-white border border-slate-100 rounded-2xl shadow-xl overflow-hidden hidden max-h-80 overflow-y-auto custom-scrollbar"></div>
            </div>
        </div>

        <!-- Секция фильтров (Скрыта до выбора группы) -->
        <div id="moduleFilterSection" class="mb-6 hidden fade-in bg-white p-5 rounded-2xl border border-slate-200 shadow-sm relative z-30">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-4">
                <h3 class="text-sm font-bold text-slate-500 uppercase tracking-wider">Ваши подгруппы и модули</h3>
                <div class="flex gap-2">
                    <button onclick="selectAllModules()" class="text-xs font-semibold px-3 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-lg transition-colors">Выбрать всё</button>
                    <button onclick="clearAllModules()" class="text-xs font-semibold px-3 py-1.5 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-lg transition-colors">Сбросить</button>
                </div>
            </div>
            <div id="moduleContainer" class="flex flex-wrap gap-2"></div>
        </div>

        <!-- Контейнер для сетки расписания -->
        <div id="scheduleGrid" class="fade-in">
            <!-- Состояние по умолчанию -->
            <div class="text-center py-20 bg-white rounded-3xl border border-slate-200 border-dashed">
                <div class="w-20 h-20 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                </div>
                <h3 class="text-xl font-bold text-slate-700 mb-1">Расписание не выбрано</h3>
                <p class="text-slate-500">Воспользуйтесь поиском выше, чтобы найти свою группу.</p>
            </div>
        </div>
    </main>

    <script src="/js/schedule.js?v=2"></script>
</body>
</html>
