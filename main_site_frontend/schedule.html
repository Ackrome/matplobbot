<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расписание | ITISHCHENKO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Скелетон анимация */
        .skeleton { background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    
    <nav class="fixed top-0 w-full bg-white/90 backdrop-blur-md border-b border-slate-200 z-50 h-16 flex items-center px-6 shadow-sm">
        <a href="/" class="font-bold text-lg flex items-center gap-2">
            <div class="w-8 h-8 bg-blue-600 rounded-lg text-white flex items-center justify-center">IT</div>
            Ivan Tishchenko
        </a>
    </nav>

<main class="pt-20 md:pt-24 max-w-[1600px] mx-auto px-2 sm:px-6 lg:px-8 pb-20">
        
        <div class="w-full">
            <!-- Шапка: Адаптированная под мобилки -->
            <div class="flex flex-col md:flex-row justify-between items-center mb-4 md:mb-8 gap-3 relative z-40 w-full px-1">
                
                <div class="flex items-center justify-between w-full md:w-auto gap-3">
                    <h1 class="text-2xl md:text-4xl font-black text-slate-900 tracking-tight">Расписание</h1>
                    
                    <!-- Выпадающая панель истории -->
                    <div class="relative" id="offlinePanelContainer">
                        <button onclick="toggleOfflinePanel(event)" 
                            class="group flex items-center gap-1.5 px-3 py-2 bg-white border border-slate-200 rounded-xl shadow-sm hover:border-blue-400 transition-all">
                            <div class="relative flex h-2 w-2">
                                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                                <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                            </div>
                            <span class="text-xs md:text-sm font-bold text-slate-600">Доступно оффлайн</span>
                            <svg id="offlineArrow" class="w-4 h-4 text-slate-400 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </button>

                        <div id="offlineDropdown" 
                            class="absolute right-0 md:left-0 mt-2 w-64 md:w-72 bg-white border border-slate-100 rounded-2xl shadow-2xl overflow-hidden hidden opacity-0 translate-y-2 transition-all duration-200 z-50">
                            <div class="p-3 border-b border-slate-50 bg-slate-50/50">
                                <h3 class="font-black text-[10px] text-slate-400 uppercase tracking-wider text-center">Доступно оффлайн</h3>
                            </div>
                            <div id="cachedEntitiesList" class="p-1.5 flex flex-col gap-1 max-h-80 overflow-y-auto custom-scrollbar"></div>
                        </div>
                    </div>
                </div>
                
                <!-- Поиск: на мобилках всегда под заголовком -->
                <div class="relative w-full md:w-96" id="searchContainer">
                    <input type="text" id="groupSearch" autocomplete="off"
                        class="w-full pl-11 pr-4 py-3 bg-white border border-slate-200 rounded-xl shadow-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all font-medium text-slate-700 text-sm md:text-base" 
                        placeholder="Найти группу или ФИО...">
                    <div class="absolute left-3.5 top-3 text-slate-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    </div>
                    <div id="searchResults" class="absolute w-full mt-2 bg-white border border-slate-100 rounded-xl shadow-2xl overflow-hidden hidden max-h-80 overflow-y-auto custom-scrollbar z-50"></div>
                </div>
            </div>

            <!-- ЕДИНЫЙ БЛОК РАСПИСАНИЯ -->
            <div id="mainScheduleBlock" class="bg-white rounded-3xl md:rounded-[2.5rem] border border-slate-200 shadow-sm overflow-hidden flex flex-col w-full min-h-[500px]">
                
                <div id="scheduleControls" class="hidden border-b border-slate-100">
                    <!-- Навигация: кнопки крупнее для удобства нажатия пальцем -->
                    <div id="weekNav" class="flex items-center justify-between p-3 md:p-4 gap-2 bg-slate-50/50 border-b border-slate-100">
                        <div class="flex items-center gap-1 md:gap-2">
                            <button onclick="changeWeek(-1)" class="p-3 md:p-2 bg-white hover:bg-slate-50 rounded-lg text-slate-600 shadow-sm border border-slate-200">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            </button>
                            <div class="text-xs md:text-sm font-bold text-slate-800 text-center min-w-[100px] md:min-w-[140px]" id="weekRangeDisplay"></div>
                            <button onclick="changeWeek(1)" class="p-3 md:p-2 bg-white hover:bg-slate-50 rounded-lg text-slate-600 shadow-sm border border-slate-200">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                            </button>
                        </div>
                        <button onclick="setTodayWeek()" class="px-3 py-2 text-xs md:text-sm font-bold bg-white text-blue-600 rounded-lg border border-blue-100 shadow-sm">Сегодня</button>
                    </div>

                    <!-- Секция фильтров: Сворачиваемая на мобилках -->
                    <div id="moduleFilterSection" class="p-3 md:p-5">
                        <button onclick="toggleFiltersMobile()" class="md:hidden flex items-center justify-between w-full text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">
                            Фильтры и модули
                            <svg id="filterArrow" class="w-4 h-4 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        </button>
                        
                        <div id="filterContent" class="hidden md:block">
                            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-4">
                                <h3 class="hidden md:block text-xs font-bold text-slate-400 uppercase tracking-widest">Подгруппы и модули</h3>
                                <div class="flex items-center justify-between sm:justify-start gap-4 w-full sm:w-auto">
                                    <label class="flex items-center cursor-pointer group">
                                        <div class="relative">
                                            <input type="checkbox" id="useShortNames" class="sr-only" checked onchange="filterAndRender()">
                                            <div class="block bg-slate-200 w-9 h-5 rounded-full transition-colors"></div>
                                            <div class="dot absolute left-1 top-1 bg-white w-3 h-3 rounded-full transition-transform shadow-sm"></div>
                                        </div>
                                        <span class="ml-2 text-xs font-medium text-slate-500">Короткие названия</span>
                                    </label>
                                    <div class="flex gap-3">
                                        <button onclick="selectAllModules()" class="text-[10px] md:text-xs font-bold text-blue-600 uppercase">Всё</button>
                                        <button onclick="clearAllModules()" class="text-[10px] md:text-xs font-bold text-slate-400 uppercase">Сброс</button>
                                    </div>
                                </div>
                            </div>
                            <div id="moduleContainer" class="flex flex-wrap gap-1.5 md:gap-2"></div>
                        </div>
                    </div>
                </div>

                <!-- Контент сетки -->
                <div id="scheduleGridContent" class="relative bg-white">
                    <!-- Предупреждение -->
                    <div id="offlineWarning" class="hidden m-3 p-3 bg-amber-50 border border-amber-100 rounded-xl flex items-center gap-2 text-amber-800 fade-in">
                        <svg class="w-4 h-4 text-amber-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        <span class="text-[10px] md:text-sm font-medium">ВУЗ недоступен. Загружена копия.</span>
                    </div>

                    <div id="desktopSchedule" class="hidden lg:block w-full"></div>
                    <!-- Плотная лента для мобилок -->
                    <div id="mobileSchedule" class="block lg:hidden flex flex-col gap-0"></div>
                    
                    <!-- Дефолтное состояние -->
                    <div id="defaultState" class="text-center py-24 px-4">
                        <div class="w-16 h-16 bg-slate-50 text-slate-200 rounded-full flex items-center justify-center mx-auto mb-4">
                            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        </div>
                        <h3 class="text-base font-bold text-slate-400 tracking-tight">Выберите расписание</h3>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/js/schedule.js?v=7.0"></script>
</body>
</html>
