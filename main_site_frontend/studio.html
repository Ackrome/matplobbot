<!DOCTYPE html>
<html lang="ru" class="h-full">
<head>
    <meta charset="UTF-8">
    <title>Document Studio | Matplobbot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- 1. ВСЕ БИБЛИОТЕКИ СТРОГО ДО ЗАГРУЗЧИКА MONACO -->
    <!-- Markdown & KaTeX -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    
    <!-- Mermaid (используем v9 для стабильной работы без ES-модулей) -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@9.4.3/dist/mermaid.min.js"></script>
    
    <!-- Split.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/split.js/1.6.5/split.min.js"></script>

    <!-- 2. Загрузчик MONACO (Обязательно в самом конце!) -->
    <script>var require = { paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.38.0/min/vs' } };</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.38.0/min/vs/loader.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; overflow: hidden; }
        .split { display: flex; flex-direction: row; height: calc(100vh - 64px); }
        .gutter { background-color: #f1f5f9; cursor: col-resize; border-left: 1px solid #e2e8f0; border-right: 1px solid #e2e8f0;}
        .file-item.active { background-color: #e0e7ff; border-left: 3px solid #4f46e5; font-weight: 600;}
        
        /* Стили для Live Preview Markdown */
        #live-preview-content { font-family: 'Inter', sans-serif; line-height: 1.6; padding: 2rem; max-width: 800px; margin: 0 auto; background: white; min-height: 100%; box-shadow: 0 0 15px rgba(0,0,0,0.05); }
        #live-preview-content h1, #live-preview-content h2 { border-bottom: 1px solid #eee; padding-bottom: 0.3em; margin-top: 1em; }
        #live-preview-content pre { background: #f8fafc; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 h-full flex flex-col">

    <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-4 shrink-0 z-10">
        <div class="flex items-center gap-4">
            <a href="/" class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-600 to-indigo-600 flex items-center justify-center text-white font-bold shadow-md">IT</a>
            
            <div class="bg-slate-100 p-1 rounded-lg flex gap-1 items-center">
                <button id="mode-quick" class="px-3 py-1.5 text-sm font-medium rounded-md bg-white shadow-sm text-blue-700 transition-all">Quick Snippet</button>
                <button id="mode-project" class="px-3 py-1.5 text-sm font-medium rounded-md text-slate-500 hover:text-slate-800 transition-all">Project</button>
            </div>

            <select id="doc-type" class="bg-slate-50 border border-slate-200 text-sm rounded-lg focus:ring-blue-500 p-2 outline-none">
                <option value="latex">LaTeX</option>
                <option value="markdown">Markdown</option>
                <option value="mermaid">Mermaid</option>
            </select>
        </div>

        <div class="flex items-center gap-2">
            <!-- Кнопки Экспорта (Изначально скрыты) -->
            <button id="btn-download-pdf" onclick="downloadPDF()" class="hidden p-2 text-slate-500 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors" title="Скачать PDF">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            </button>
            <button id="btn-download-zip" onclick="downloadZIP()" class="hidden p-2 text-slate-500 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors mr-2" title="Скачать ZIP проект">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
            </button>

            <button id="compile-btn" onclick="compileCurrent()" class="px-5 py-2 bg-green-600 hover:bg-green-700 text-white text-sm font-bold rounded-lg shadow-sm transition-colors flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path></svg>
                Build PDF (Ctrl+S)
            </button>
        </div>
    </header>

    <div id="split-container" class="split w-full bg-slate-100 relative">
        <div id="loader-overlay" class="absolute inset-0 bg-white/60 backdrop-blur-[1px] z-50 hidden flex-col items-center justify-center">
            <div class="w-10 h-10 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mb-3"></div>
            <div class="text-sm font-bold text-slate-600">Компиляция PDF на сервере...</div>
        </div>

        <!-- Sidebar (Hidden in Quick Mode) -->
        <div id="sidebar-pane" class="h-full bg-slate-50 flex flex-col border-r border-slate-200 shrink-0 hidden">
            <div class="p-3 border-b border-slate-200">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Проекты</span>
                    <button onclick="createNewProject()" class="text-blue-600 hover:text-blue-800">+</button>
                </div>
                <select id="project-selector" class="w-full text-sm border border-slate-200 rounded-md p-1.5 outline-none bg-white" onchange="openProject(this.value)"></select>
            </div>
            <div class="p-3 border-b border-slate-200 bg-slate-100 flex justify-between items-center">
                <span class="text-xs font-bold text-slate-500 uppercase">Файлы</span>
                <label class="cursor-pointer text-blue-600 font-bold text-xs" title="Загрузить">
                    Upload <input type="file" id="file-uploader" class="hidden" onchange="uploadAsset(event)">
                </label>
            </div>
            <div id="file-list" class="flex-1 overflow-y-auto py-2"></div>
        </div>

        <!-- Editor -->
        <div id="editor-pane" class="h-full bg-white relative flex flex-col">
            <div id="monaco-container" class="flex-grow relative"></div>
            
            <!-- СТАТУС БАР (НОВОЕ) -->
            <div class="h-7 bg-blue-600 text-white flex items-center justify-between px-3 text-[11px] font-medium shrink-0 z-10">
                <div class="flex items-center gap-4">
                    <span id="doc-stats">0 words, 0 chars</span>
                </div>
                <div class="flex items-center gap-2">
                    <span id="status-text">Ready</span>
                    <svg id="status-icon-saved" class="w-3 h-3 text-green-300 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    <svg id="status-icon-sync" class="w-3 h-3 text-white animate-spin hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </div>
            </div>

            <!-- Error Panel -->
            <div id="error-panel" class="absolute bottom-7 w-full bg-red-50 border-t border-red-200 text-red-800 text-xs p-3 hidden max-h-48 overflow-y-auto font-mono z-20 shadow-[0_-10px_15px_rgba(0,0,0,0.05)]">
                <div class="font-bold mb-1 flex justify-between">
                    <span>LaTeX Errors:</span>
                    <button onclick="document.getElementById('error-panel').classList.add('hidden')" class="hover:text-red-500">✕</button>
                </div>
                <pre id="error-text" class="whitespace-pre-wrap"></pre>
            </div>
        </div>
    </div>

    <script src="/js/studio.js?v=4"></script>
</body>
</html>
