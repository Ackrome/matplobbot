<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход | ITISHCHENKO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen font-['Inter']">
    <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md border border-slate-100">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl mx-auto flex items-center justify-center text-white text-2xl font-bold mb-4 shadow-lg shadow-blue-200">IT</div>
            <h1 class="text-2xl font-bold text-slate-900">Добро пожаловать</h1>
            <p class="text-slate-500">Войдите для доступа к настройкам</p>
        </div>
        
        <!-- TELEGRAM LOGIN WIDGET -->
        <div class="flex justify-center mb-6">
            <!-- ВАЖНО: ЗАМЕНИТЕ matplobbot НА ИМЯ ВАШЕГО БОТА -->
            <script async src="https://telegram.org/js/telegram-widget.js?22" 
                    data-telegram-login="matplobbot" 
                    data-size="large" 
                    data-radius="12" 
                    data-onauth="onTelegramAuth(user)" 
                    data-request-access="write"></script>
        </div>

        <div class="relative flex py-5 items-center">
            <div class="flex-grow border-t border-slate-200"></div>
            <span class="flex-shrink-0 mx-4 text-slate-400 text-sm font-medium">или по паролю (для админов)</span>
            <div class="flex-grow border-t border-slate-200"></div>
        </div>
        
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Логин</label>
                <input type="text" id="username" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="admin" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Пароль</label>
                <input type="password" id="password" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="••••••••" required>
            </div>
            <button type="submit" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold hover:bg-slate-800 transition-all shadow-lg shadow-slate-200">
                Войти по паролю
            </button>
        </form>
        <div id="error" class="mt-4 text-red-500 text-center text-sm hidden"></div>
        
        <div class="mt-6 text-center text-sm text-slate-500">
            Нет аккаунта администратора? <a href="/register" class="text-blue-600 font-semibold hover:underline">Создать</a>
        </div>
    </div>
    
    <!-- Добавлена глобальная функция для Telegram коллбека -->
    <script>
        function onTelegramAuth(user) {
            // Вызываем логику из auth.js
            window.handleTelegramLogin(user);
        }
    </script>
    <script src="/js/auth.js?v=3"></script>
</body>
</html>
