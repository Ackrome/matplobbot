<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="login.meta.title">Вход | ITISHCHENKO</title>
    <!-- Иконки сайта -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" sizes="192x192" href="/android-chrome-192x192.png">
    <link rel="icon" sizes="512x512" href="/android-chrome-512x512.png">
    <link rel="manifest" href="/site.webmanifest">

    <script>
        window.tailwind = window.tailwind || {};
        window.tailwind.config = { darkMode: 'class' };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.3); }
        html.dark .glass { background: rgba(15, 23, 42, 0.8); border-bottom: 1px solid rgba(30, 41, 59, 0.8); }
        .nav-hidden { transform: translateY(-100%); opacity: 0; }
        .nav-visible { transform: translateY(0); opacity: 1; }
        @media (max-width: 640px) {
            .auth-card {
                border-radius: 1.25rem;
                padding: 1.25rem;
            }
        }
    </style>
</head>
<body class="bg-gradient-to-b from-slate-100 via-slate-50 to-white text-slate-900 flex flex-col min-h-screen dark:from-slate-950 dark:via-slate-900 dark:to-slate-950 dark:text-slate-100">

    <!-- Универсальная шапка -->
    <nav class="glass fixed top-0 w-full z-50 transition-all duration-300 nav-visible" id="navbar">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16 sm:h-20">
                <a href="/" class="flex-shrink-0 flex items-center space-x-2 group">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-600 to-indigo-600 flex items-center justify-center text-white font-bold text-lg shadow-lg shadow-blue-500/30 group-hover:scale-105 transition-transform">IT</div>
                    <span class="hidden sm:inline text-lg font-bold text-slate-800 dark:text-slate-100">Ivan Tishchenko</span>
                </a>
                <div class="hidden md:flex space-x-8 items-center" id="desktop-nav-links">
                    <a href="/#projects" class="text-slate-600 font-medium hover:text-blue-600 transition-colors dark:text-slate-300 dark:hover:text-blue-300">Проекты</a>
                    <a href="/schedule" class="text-slate-600 font-medium hover:text-blue-600 transition-colors dark:text-slate-300 dark:hover:text-blue-300">Расписание</a>
                    <div id="desktop-auth-container" class="flex items-center gap-4">
                        <a href="/login" class="group relative px-6 py-2.5 bg-slate-900 text-white rounded-full font-medium overflow-hidden shadow-lg shadow-slate-900/20 hover:shadow-slate-900/40 transition-all">
                            <span class="relative z-10 flex items-center gap-2">Авторизация</span>
                            <div class="absolute inset-0 bg-gradient-to-r from-blue-600 to-indigo-600 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                        </a>
                    </div>
                </div>
                <div class="md:hidden flex items-center">
                    <button id="mobile-menu-button" class="text-slate-600 hover:text-blue-600 focus:outline-none p-2 rounded-lg hover:bg-slate-100 transition-colors dark:text-slate-300 dark:hover:bg-slate-800 dark:hover:text-blue-300">
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" /></svg>
                    </button>
                </div>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-white border-t border-slate-100 absolute w-full shadow-xl max-h-[calc(100vh-4rem)] overflow-y-auto dark:border-slate-800 dark:bg-slate-900">
            <div class="px-4 pt-2 pb-6 space-y-1" id="mobile-nav-links"></div>
        </div>
    </nav>

    <!-- Отступ сверху, чтобы шапка не перекрывала контент -->
    <main class="flex-grow flex items-start sm:items-center justify-center w-full pt-24 sm:pt-32 pb-6 sm:pb-10 px-3 sm:px-4">
        <div class="auth-card bg-white p-8 rounded-3xl shadow-xl w-full max-w-md border border-slate-100 dark:border-slate-700 dark:bg-slate-800">
            <div class="text-center mb-6 sm:mb-8">
                <div class="w-16 h-16 bg-blue-600 rounded-2xl mx-auto flex items-center justify-center text-white text-2xl font-bold mb-4 shadow-lg shadow-blue-200">IT</div>
                <h1 data-i18n="login.heading" class="text-xl sm:text-2xl font-bold text-slate-900 dark:text-slate-100">Добро пожаловать</h1>
                <p data-i18n="login.subheading" class="text-sm sm:text-base text-slate-500 dark:text-slate-400">Войдите для доступа к настройкам</p>
            </div>

            <!-- TELEGRAM LOGIN WIDGET -->
            <div class="flex flex-col items-center mb-6">
                <!-- ВАЖНО: замените matplobbot на имя вашего бота -->
                <script async src="https://telegram.org/js/telegram-widget.js"
                        data-telegram-login="matplobbot"
                        data-size="large"
                        data-radius="12"
                        data-onauth="onTelegramAuth(user)"
                        data-request-access="write"></script>

                <!-- Подсказка -->
                <p data-i18n="login.telegram.hint" class="text-[10px] text-slate-400 mt-2 text-center max-w-xs leading-tight dark:text-slate-500">
                    Telegram запоминает вашу сессию. Чтобы выйти, нужно завершить сессию через Telegram там же, где вы ее разрешали.
                </p>
            </div>

            <div class="relative flex py-4 sm:py-5 items-center">
                <div class="flex-grow border-t border-slate-200 dark:border-slate-700"></div>
                <span data-i18n="login.password.alt" class="flex-shrink-0 mx-3 sm:mx-4 text-slate-400 text-xs sm:text-sm font-medium text-center dark:text-slate-500">или по паролю (для админов)</span>
                <div class="flex-grow border-t border-slate-200 dark:border-slate-700"></div>
            </div>

            <form id="loginForm" class="space-y-4">
                <div>
                    <label data-i18n="login.form.username" class="block text-sm font-medium text-slate-700 mb-1 dark:text-slate-300">Логин</label>
                    <input type="text" id="username" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none text-base dark:border-slate-700 dark:bg-slate-900 dark:text-slate-100 dark:placeholder:text-slate-500" placeholder="admin" required>
                </div>
                <div>
                    <label data-i18n="login.form.password" class="block text-sm font-medium text-slate-700 mb-1 dark:text-slate-300">Пароль</label>
                    <input type="password" id="password" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none text-base dark:border-slate-700 dark:bg-slate-900 dark:text-slate-100 dark:placeholder:text-slate-500" placeholder="********" required>
                </div>
                <button type="submit" data-i18n="login.form.submit" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold hover:bg-slate-800 transition-all shadow-lg shadow-slate-200 dark:bg-blue-600 dark:hover:bg-blue-500 dark:shadow-blue-950/30">
                    Войти по паролю
                </button>
            </form>
            <div id="error" class="mt-4 text-red-500 text-center text-sm hidden"></div>

            <div class="mt-6 text-center text-sm text-slate-500 dark:text-slate-400">
                <span data-i18n="login.noAdmin">Нет аккаунта администратора?</span> <a href="/register" data-i18n="login.create" class="text-blue-600 font-semibold hover:underline">Создать</a>
            </div>
        </div>
    </main>

    <script>
        function onTelegramAuth(user) {
            window.handleTelegramLogin(user);
        }
    </script>
    <script src="/js/runtime_config.js?v=1"></script>
    <script src="/js/ui_utils.js?v=1"></script>
    <script src="/js/navbar.js?v=20"></script>
    <script src="/js/auth.js?v=5"></script>
</body>
</html>
