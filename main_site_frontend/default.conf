server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # 1. ПЕРЕНАПРАВЛЕНИЕ КАЛЕНДАРЕЙ
    location /api/cal/ {
        # Проксируем запрос в контейнер FastAPI по его внутреннему имени и порту
        proxy_pass http://mpb-fastapi-stats:9583;
        
        # Передаем правильные заголовки, чтобы FastAPI не паниковал
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. ОСТАЛЬНОЙ САЙТ (лэндинг, расписание, логин)
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }
}