# version: '3.8'

# This file is for production. It uses pre-built images from GHCR.
services:
  redis: # Added redis service for production consistency
    image: redis:7-alpine 
    restart: unless-stopped
    # The port is exposed to the host, but other services will connect via the internal Docker network.
    # If you don't need to access Redis from outside the Docker host, you can remove the 'ports' section.
    # ports:
    #   - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file: ./.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  mpb-telegram-bot:
    image: ghcr.io/ackrome/matplobbot-bot:${BOT_TAG:-latest}
    restart: unless-stopped
    stop_grace_period: 30s
    env_file: ./.env
    volumes:
      - bot_logs:/app/logs # Logs are persisted in a named volume
    depends_on:
      mpb-worker:
        condition: service_started
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:host-gateway"


  mpb-scheduler:
    image: ghcr.io/ackrome/matplobbot-scheduler:${SCHEDULER_TAG:-latest}
    restart: unless-stopped
    stop_grace_period: 30s
    ports:
      - "9584:9584"
    env_file: ./.env
    environment:
      - TZ=Europe/Moscow
    volumes:
      - bot_logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9584/health"]
      interval: 30s
      timeout: 10s
      retries: 3


  migrator:
    image: ghcr.io/ackrome/matplobbot-bot:${BOT_TAG:-latest}
    command: ["/bin/bash", "-c", "alembic upgrade head"]
    env_file: ./.env
    depends_on:
      postgres:
        condition: service_healthy

  mpb-worker:
    image: ghcr.io/ackrome/matplobbot-worker:${WORKER_TAG:-latest} # <--- Use tag from ENV
    restart: unless-stopped
    # command is baked into Dockerfile.worker, but can be overridden if needed
    # command: celery -A shared_lib.celery_app worker --loglevel=info --concurrency=2
    env_file: ./.env
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - bot_logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
        
  mpb-fastapi-stats:
    image: ghcr.io/ackrome/matplobbot-api:${API_TAG:-latest} 
    restart: unless-stopped
    stop_grace_period: 30s
    env_file: ./.env
    ports:
      - "127.0.0.1:9583:9583"
    volumes:
      - bot_logs:/app/logs # All services write to the same log volume
      - ./fastapi_stats_app:/fastapi_stats_app
      - ./shared_lib:/shared_lib
    depends_on:
      mpb-telegram-bot:
        condition: service_started
      migrator:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9583/api/stats/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  

  main-site-frontend:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./main_site_frontend:/usr/share/nginx/html:ro
      # ДОБАВЬ ЭТУ СТРОКУ:
      - ./main_site_frontend/default.conf:/etc/nginx/conf.d/default.conf:ro

  caddy:
    image: caddy:alpine
    restart: unless-stopped
    network_mode: host # Оставляем host, чтобы не мучиться с портами 80/443
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - mpb-fastapi-stats
      - main-site-frontend

proxy:
    image: python:3.11-alpine
    restart: unless-stopped
    env_file: ./.env
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "1. Downloading proxy core..."
        wget -qO mihomo.gz https://github.com/MetaCubeX/mihomo/releases/download/v1.18.3/mihomo-linux-amd64-compatible-v1.18.3.gz
        gunzip mihomo.gz
        chmod +x mihomo
        mv mihomo /usr/local/bin/

        echo "2. Creating Dynamic Subscription Cleaner..."
        cat << 'EOF' > /cleaner.py
        import urllib.request, base64, os
        from http.server import BaseHTTPRequestHandler, HTTPServer
        
        class SubHandler(BaseHTTPRequestHandler):
            def log_message(self, format, *args): pass # Отключаем спам в логи
            
            def do_GET(self):
                try:
                    url = os.environ.get('SUB_URL')
                    # Скачиваем подписку
                    req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
                    with urllib.request.urlopen(req, timeout=15) as resp:
                        raw_data = resp.read().decode('utf-8').strip()
                    
                    # ЧИНИМ PADDING И РАСШИФРОВЫВАЕМ BASE64
                    try:
                        padded = raw_data + "=" * ((4 - len(raw_data) % 4) % 4)
                        decoded = base64.b64decode(padded).decode('utf-8')
                    except Exception:
                        decoded = raw_data # Если не base64
                    
                    # ОЧИЩАЕМ УЗЛЫ
                    clean_links =[]
                    for i, line in enumerate(decoded.splitlines()):
                        line = line.strip()
                        if '://' in line:
                            parts = line.split('#', 1)
                            clean_links.append(f"{parts[0]}#Node_{i}")
                    
                    # ЗАШИФРОВЫВАЕМ ОБРАТНО
                    final_b64 = base64.b64encode('\n'.join(clean_links).encode('utf-8'))
                    
                    self.send_response(200)
                    self.send_header('Content-type', 'text/plain')
                    self.end_headers()
                    self.wfile.write(final_b64)
                except Exception as e:
                    print(f"Error fetching sub: {e}")
                    self.send_response(500)
                    self.end_headers()
        
        HTTPServer(('127.0.0.1', 8080), SubHandler).serve_forever()
        EOF

        echo "3. Generating proxy config..."
        cat << 'EOF' > /config.yaml
        mixed-port: 20170
        allow-lan: true
        mode: rule
        log-level: warning
        proxy-providers:
          provider:
            type: http
            url: "http://127.0.0.1:8080/"
            interval: 3600
            path: ./provider.yaml
            health-check:
              enable: true
              url: http://www.gstatic.com/generate_204
              interval: 60
        proxy-groups:
          - name: "AUTO-BEST-NODE"
            type: url-test
            use: [provider]
            url: http://www.gstatic.com/generate_204
            interval: 60
            tolerance: 50
        rules:
          - MATCH, AUTO-BEST-NODE
        EOF

        echo "4. Starting Python Cleaner in background..."
        python3 /cleaner.py &
        
        echo "5. Starting Proxy Core in foreground..."
        exec /usr/local/bin/mihomo -d / -f /config.yaml

volumes:
  bot_logs:
  redis_data:
  postgres_data:
  caddy_data:
  caddy_config: