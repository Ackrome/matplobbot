# version: '3.8'

# This file is for production. It uses pre-built images from GHCR.
services:
  redis: # Added redis service for production consistency
    image: redis:7-alpine 
    restart: unless-stopped
    # The port is exposed to the host, but other services will connect via the internal Docker network.
    # If you don't need to access Redis from outside the Docker host, you can remove the 'ports' section.
    # ports:
    #   - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file: ./.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  mpb-telegram-bot:
    image: ghcr.io/ackrome/matplobbot-bot:${BOT_TAG:-latest}
    restart: unless-stopped
    stop_grace_period: 30s
    env_file: ./.env
    volumes:
      - bot_logs:/app/logs # Logs are persisted in a named volume
    depends_on:
      mpb-worker:
        condition: service_started
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:host-gateway"


  mpb-scheduler:
    image: ghcr.io/ackrome/matplobbot-scheduler:${SCHEDULER_TAG:-latest}
    restart: unless-stopped
    stop_grace_period: 30s
    ports:
      - "9584:9584"
    env_file: ./.env
    environment:
      - TZ=Europe/Moscow
    volumes:
      - bot_logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9584/health"]
      interval: 30s
      timeout: 10s
      retries: 3


  migrator:
    image: ghcr.io/ackrome/matplobbot-bot:${BOT_TAG:-latest}
    command: ["/bin/bash", "-c", "alembic upgrade head"]
    env_file: ./.env
    depends_on:
      postgres:
        condition: service_healthy

  mpb-worker:
    image: ghcr.io/ackrome/matplobbot-worker:${WORKER_TAG:-latest} # <--- Use tag from ENV
    restart: unless-stopped
    # command is baked into Dockerfile.worker, but can be overridden if needed
    # command: celery -A shared_lib.celery_app worker --loglevel=info --concurrency=2
    env_file: ./.env
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - bot_logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
        
  mpb-fastapi-stats:
    image: ghcr.io/ackrome/matplobbot-api:${API_TAG:-latest} 
    restart: unless-stopped
    stop_grace_period: 30s
    env_file: ./.env
    ports:
      - "127.0.0.1:9583:9583"
    volumes:
      - bot_logs:/app/logs # All services write to the same log volume
      - ./fastapi_stats_app:/fastapi_stats_app
      - ./shared_lib:/shared_lib
    depends_on:
      mpb-telegram-bot:
        condition: service_started
      migrator:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9583/api/stats/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  

  main-site-frontend:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./main_site_frontend:/usr/share/nginx/html:ro
      # ДОБАВЬ ЭТУ СТРОКУ:
      - ./main_site_frontend/default.conf:/etc/nginx/conf.d/default.conf:ro

  caddy:
    image: caddy:alpine
    restart: unless-stopped
    network_mode: host # Оставляем host, чтобы не мучиться с портами 80/443
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - mpb-fastapi-stats
      - main-site-frontend

  proxy:
    image: python:3.11-alpine
    restart: unless-stopped
    env_file: ./.env
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo "1. Downloading proxy core securely..."
        # Качаем ядро надежно через Python, чтобы избежать ошибок wget
        python3 -c "import urllib.request; urllib.request.urlretrieve('https://github.com/MetaCubeX/mihomo/releases/download/v1.18.3/mihomo-linux-amd64-compatible-v1.18.3.gz', 'mihomo.gz')"
        gunzip mihomo.gz
        chmod +x mihomo
        mv mihomo /usr/local/bin/

        echo "2. Creating Ultimate Subscription Cleaner..."
        cat << 'EOF' > /cleaner.py
        import urllib.request, json, os, base64
        from http.server import BaseHTTPRequestHandler, HTTPServer
        
        # Защитные функции, чтобы спастись от любых ошибок Attribute/TypeError
        def safe_dict(d): return d if isinstance(d, dict) else {}
        def safe_list(l): return l if isinstance(l, list) else[]

        def process_something_json(raw_data):
            try:
                configs = json.loads(raw_data)
                if isinstance(configs, dict): configs = [configs]
                if not isinstance(configs, list): return None
            except Exception as e:
                print(f"JSON Parse Error: {e}", flush=True)
                return None

            yaml_lines =[]
            valid_nodes = 0
            
            for i, conf in enumerate(configs):
                conf = safe_dict(conf)
                if not conf: continue
                
                raw_name = conf.get('remarks', f'something_{i}')
                safe_name = "".join([c for c in str(raw_name) if c.isalnum() or c in " -_"]).strip()
                safe_name = f"{safe_name}_{i}"
                
                vless = None
                socks = None
                
                for out in safe_list(conf.get('outbounds')):
                    out = safe_dict(out)
                    if out.get('protocol') == 'vless': vless = out
                    elif out.get('protocol') == 'socks': socks = out
                
                if not vless: continue
                
                socks_name = f"upstream_{i}"
                if socks:
                    try:
                        s_sett = safe_dict(socks.get('settings'))
                        s_srv = safe_list(s_sett.get('servers'))
                        s_srv = safe_dict(s_srv[0] if s_srv else {})
                        s_usr = safe_list(s_srv.get('users'))
                        s_usr = safe_dict(s_usr[0] if s_usr else {})
                        
                        if s_srv.get('address'):
                            yaml_lines.append(f"  - name: '{socks_name}'")
                            yaml_lines.append(f"    type: socks5")
                            yaml_lines.append(f"    server: {s_srv.get('address')}")
                            yaml_lines.append(f"    port: {s_srv.get('port', 1080)}")
                            if s_usr.get('user'):
                                yaml_lines.append(f"    username: '{s_usr.get('user')}'")
                                yaml_lines.append(f"    password: '{s_usr.get('pass')}'")
                        else:
                            socks = None
                    except Exception as e:
                        print(f"Socks error: {e}", flush=True)
                        socks = None
                
                try:
                    v_sett = safe_dict(vless.get('settings'))
                    v_next = safe_list(v_sett.get('vnext'))
                    v_srv = safe_dict(v_next[0] if v_next else {})
                    v_usr = safe_list(v_srv.get('users'))
                    v_usr = safe_dict(v_usr[0] if v_usr else {})
                    
                    stream = safe_dict(vless.get('streamSettings'))
                    reality = safe_dict(stream.get('realitySettings'))
                    
                    if not v_srv.get('address'): continue

                    yaml_lines.append(f"  - name: '{safe_name}'")
                    yaml_lines.append(f"    type: vless")
                    yaml_lines.append(f"    server: {v_srv.get('address')}")
                    yaml_lines.append(f"    port: {v_srv.get('port', 443)}")
                    yaml_lines.append(f"    uuid: {v_usr.get('id', '')}")
                    yaml_lines.append(f"    network: {stream.get('network', 'tcp')}")
                    yaml_lines.append(f"    tls: true")
                    yaml_lines.append(f"    udp: true")
                    
                    if v_usr.get('flow'):
                        yaml_lines.append(f"    flow: {v_usr.get('flow')}")
                    
                    yaml_lines.append(f"    client-fingerprint: {reality.get('fingerprint', 'chrome')}")
                    yaml_lines.append(f"    servername: {reality.get('serverName', '')}")
                    yaml_lines.append(f"    reality-opts:")
                    yaml_lines.append(f"      public-key: {reality.get('publicKey', '')}")
                    yaml_lines.append(f"      short-id: {reality.get('shortId', '')}")
                    
                    if socks:
                        yaml_lines.append(f"    dialer-proxy: '{socks_name}'")
                    
                    valid_nodes += 1
                except Exception as e:
                    print(f"VLESS error: {e}", flush=True)

            if valid_nodes == 0: return None
            return "proxies:\n" + "\n".join(yaml_lines)

        class SubHandler(BaseHTTPRequestHandler):
            def log_message(self, format, *args): pass
            def do_GET(self):
                try:
                    url = os.environ.get('SUB_URL')
                    print(f"Fetching from {url[:40]}...", flush=True)
                    req = urllib.request.Request(url, headers={'User-Agent': 'v2rayNG/1.8.5'})
                    
                    with urllib.request.urlopen(req, timeout=15) as resp:
                        raw = resp.read().decode('utf-8', errors='ignore').strip()
                    
                    if raw.startswith('[') or raw.startswith('{'):
                        print("Detected JSON Array/Object. Converting...", flush=True)
                        yaml_out = process_something_json(raw)
                        if yaml_out:
                            print("Conversion successful! Sending YAML to Mihomo.", flush=True)
                            self.send_response(200)
                            self.send_header('Content-type', 'application/yaml')
                            self.end_headers()
                            self.wfile.write(yaml_out.encode('utf-8'))
                            return
                    else:
                        print("Detected Base64 format. Converting...", flush=True)
                        pad = "=" * ((4 - len(raw) % 4) % 4)
                        try:
                            decoded = base64.b64decode(raw + pad).decode('utf-8', errors='ignore')
                        except:
                            decoded = base64.urlsafe_b64decode(raw + pad).decode('utf-8', errors='ignore')
                            
                        clean_links = []
                        for i, line in enumerate(decoded.splitlines()):
                            line = line.strip()
                            if '://' in line:
                                parts = line.split('#', 1)
                                clean_links.append(f"{parts[0]}#Node_{i}")
                        if clean_links:
                            out_data = base64.b64encode('\n'.join(clean_links).encode('utf-8'))
                            print("Conversion successful! Sending Base64.", flush=True)
                            self.send_response(200)
                            self.send_header('Content-type', 'text/plain')
                            self.end_headers()
                            self.wfile.write(out_data)
                            return

                    print("Failed to process. Sending 500.", flush=True)
                    self.send_response(500)
                    self.end_headers()
                except Exception as e:
                    print(f"Server Error: {e}", flush=True)
                    self.send_response(500)
                    self.end_headers()
        
        print("Starting Python Converter on 8080...", flush=True)
        HTTPServer(('127.0.0.1', 8080), SubHandler).serve_forever()
        EOF

        echo "3. Generating proxy config..."
        cat << 'EOF' > /config.yaml
        mixed-port: 20170
        allow-lan: true
        mode: rule
        log-level: warning
        proxy-providers:
          something:
            type: http
            url: "http://127.0.0.1:8080/"
            interval: 3600
            path: ./something.yaml
            health-check:
              enable: true
              url: http://www.gstatic.com/generate_204
              interval: 60
        proxy-groups:
          - name: "AUTO-BEST-NODE"
            type: url-test
            use: [something]
            url: http://www.gstatic.com/generate_204
            interval: 60
            tolerance: 50
        rules:
          - MATCH, AUTO-BEST-NODE
        EOF

        echo "4. Starting Python Converter in background..."
        python3 -u /cleaner.py &
        
        echo "5. Waiting for Python Server..."
        sleep 2
        
        echo "6. Starting Proxy Core in foreground..."
        exec /usr/local/bin/mihomo -d / -f /config.yaml

volumes:
  bot_logs:
  redis_data:
  postgres_data:
  caddy_data:
  caddy_config: