name: Auto Lint Autofix

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    name: Run Pre-commit Autofix
    if: |
      github.actor != 'github-actions[bot]' &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip pre-commit

      - name: Run auto-fixes
        continue-on-error: true
        run: |
          pre-commit run --all-files --show-diff-on-failure

      - name: Commit and push changes
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          # GitHub App tokens cannot update workflow files without extra permissions.
          # Keep autofix commits focused on source/docs changes only.
          git restore --worktree --staged -- .github/workflows || true

          if git diff --cached --quiet; then
            echo "No auto-fix changes to commit."
            exit 0
          fi

          git commit -m "chore(lint): auto-fix with pre-commit"
          git push origin HEAD:${{ github.head_ref || github.ref_name }}
