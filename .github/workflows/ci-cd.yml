name: CI-CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ackrome

jobs:
  cancel:
    name: 'Cancel Other Workflow'
    runs-on: ubuntu-latest
    steps:
      - uses: styfle/cancel-workflow-action@0.9.0
        with:
          access_token: ${{ github.token }}
  # 1. Check what files changed
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      base: ${{ steps.filter.outputs.base }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            base:
              - 'requirements.in'
              - 'requirements.txt'
              - 'Dockerfile.base-python'
              - 'Dockerfile.base-worker'

  # 2. Validation Quality Gates
  validate:
    name: Validate (Lint, Tests, Types)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Verify shared package version consistency
        run: |
          python - <<'PY'
          import re
          import sys
          from pathlib import Path

          setup_text = Path("setup.py").read_text(encoding="utf-8")
          setup_match = re.search(r'version="(\d+\.\d+\.\d+)"', setup_text)
          if not setup_match:
              print("Could not read version from setup.py", file=sys.stderr)
              sys.exit(1)
          setup_version = setup_match.group(1)

          files = [
              Path("requirements.in"),
              Path("requirements.txt"),
              Path("fastapi_stats_app/requirements.txt"),
              Path("scheduler_app/requirements.txt"),
          ]
          pattern = re.compile(r"^matplobbot-shared==(\d+\.\d+\.\d+)$", re.MULTILINE)

          errors = []
          for req_file in files:
              content = req_file.read_text(encoding="utf-8")
              matches = pattern.findall(content)
              if not matches:
                  errors.append(f"{req_file}: missing matplobbot-shared pin")
                  continue
              unique = sorted(set(matches))
              if len(unique) != 1:
                  errors.append(f"{req_file}: conflicting pins {unique}")
                  continue
              if unique[0] != setup_version:
                  errors.append(
                      f"{req_file}: pin {unique[0]} does not match setup.py version {setup_version}"
                  )

          if errors:
              print("Shared package version consistency check failed:", file=sys.stderr)
              for err in errors:
                  print(f" - {err}", file=sys.stderr)
              sys.exit(1)

          print(f"Shared version is consistent across files: {setup_version}")
          PY
      - name: Verify Dockerfiles do not install shared package from PyPI
        run: |
          python - <<'PY'
          import sys
          from pathlib import Path

          grep_guard = "grep -Ev '^[[:space:]]*matplobbot-shared=='"
          required_snippets = {
              "Dockerfile.base-python": [grep_guard],
              "Dockerfile.base-worker": [grep_guard],
              "fastapi_stats_app/Dockerfile": [grep_guard, "pip install --no-cache-dir /"],
              "scheduler_app/Dockerfile": [grep_guard, "pip install --no-cache-dir /"],
          }

          errors = []
          for file_path, snippets in required_snippets.items():
              content = Path(file_path).read_text(encoding="utf-8")
              for snippet in snippets:
                  if snippet not in content:
                      errors.append(f"{file_path}: missing snippet `{snippet}`")

          if errors:
              print(
                  "Dockerfile shared-package guard check failed. Expected local/source install guards:",
                  file=sys.stderr,
              )
              for err in errors:
                  print(f" - {err}", file=sys.stderr)
              sys.exit(1)

          print("Dockerfile guard check passed")
          PY
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install local shared package first so validation does not depend on PyPI
          # having the same version already published.
          pip install -e .
          pip install -r requirements.txt -r fastapi_stats_app/requirements.txt -r scheduler_app/requirements.txt
          pip install ruff==0.8.6 mypy==1.13.0 pip-audit==2.7.3 coverage==7.8.2
      - name: Lint checks
        run: |
          ruff check . --select E9,F63,F7,F82
      - name: Unit and integration tests (with coverage gate)
        id: coverage_current
        env:
          JWT_SECRET_KEY: ci-test-secret
        run: |
          coverage run --branch -m unittest discover -s tests -v
          coverage report --skip-covered --fail-under=10
          coverage xml -o coverage.xml
          coverage json -o coverage.json
          python - <<'PY'
          import json
          import os

          with open("coverage.json", encoding="utf-8") as f:
              percent = float(json.load(f)["totals"]["percent_covered"])

          print(f"Current coverage: {percent:.2f}%")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"percent={percent:.2f}\n")
          PY
      - name: Coverage trend vs base branch (PR only)
        if: github.event_name == 'pull_request'
        env:
          JWT_SECRET_KEY: ci-test-secret
          BASE_REF: ${{ github.base_ref }}
          CURRENT_COVERAGE: ${{ steps.coverage_current.outputs.percent }}
        run: |
          set -euo pipefail

          BASE_DIR="$(mktemp -d)"
          cleanup() {
            git worktree remove "$BASE_DIR" --force >/dev/null 2>&1 || true
            rm -rf "$BASE_DIR"
          }
          trap cleanup EXIT

          git fetch --no-tags --depth=1 origin "$BASE_REF"
          git worktree add "$BASE_DIR" "origin/$BASE_REF"

          pushd "$BASE_DIR" >/dev/null
          # Coverage trend reporting should not fail the whole validation gate.
          if python -m pip install -e . >/dev/null 2>&1 && coverage run --branch -m unittest discover -s tests -v >/dev/null 2>&1; then
            coverage json -o coverage-base.json >/dev/null 2>&1
            BASE_COVERAGE="$(python -c "import json; print(f\"{float(json.load(open('coverage-base.json', encoding='utf-8'))['totals']['percent_covered']):.2f}\")")"
            DELTA="$(python -c "current=float('${CURRENT_COVERAGE}'); base=float('${BASE_COVERAGE}'); print(f'{current-base:+.2f}')")"
            {
              echo "### Coverage Trend (PR vs ${BASE_REF})"
              echo ""
              echo "| Base | PR | Delta |"
              echo "| --- | --- | --- |"
              echo "| ${BASE_COVERAGE}% | ${CURRENT_COVERAGE}% | ${DELTA}% |"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "### Coverage Trend (PR vs ${BASE_REF})"
              echo ""
              echo "Coverage delta unavailable: base branch coverage run failed."
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          popd >/dev/null
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: |
            coverage.xml
            coverage.json
      - name: Type checks
        run: |
          mypy \
            fastapi_stats_app/auth.py \
            fastapi_stats_app/routers/studio_router.py \
            fastapi_stats_app/routers/ws_router.py \
            scheduler_app/config.py \
            scheduler_app/main.py \
            version_bumper.py \
            --ignore-missing-imports \
            --follow-imports=skip \
            --disable-error-code=import-untyped \
            --allow-untyped-defs \
            --allow-incomplete-defs
      - name: Dependency security audit
        run: |
          # Build a filtered requirements list for audit:
          # - exclude editable installs (-e/--editable)
          # - exclude local in-repo package (matplobbot-shared)
          # Keep strict mode for all third-party dependencies.
          python - <<'PY'
          from pathlib import Path

          req_files = [
              Path("requirements.txt"),
              Path("fastapi_stats_app/requirements.txt"),
              Path("scheduler_app/requirements.txt"),
          ]

          seen = set()
          filtered = []
          for req_path in req_files:
              for raw in req_path.read_text(encoding="utf-8").splitlines():
                  line = raw.strip()
                  if not line or line.startswith("#"):
                      continue
                  lower = line.lower()
                  if lower.startswith(("-e ", "--editable ")):
                      continue
                  if lower.startswith("matplobbot-shared"):
                      continue
                  if line in seen:
                      continue
                  seen.add(line)
                  filtered.append(line)

          out = Path("audit-requirements.txt")
          out.write_text("\n".join(filtered) + "\n", encoding="utf-8")
          print(f"Prepared {len(filtered)} packages for security audit")
          PY
          pip-audit --strict -r audit-requirements.txt

  # 3. Auto-Versioning
  auto-version-patch:
    name: Auto-Version Patch
    needs: [validate]
    if: |
      github.event_name == 'push' &&
      !contains(github.event.head_commit.message, 'chore(release)')
    outputs:
      new_version: ${{ steps.bumper.outputs.new_version }}
      commit_sha: ${{ steps.checkout.outputs.commit_sha }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out code
        uses: actions/checkout@v5
        id: checkout
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Configure Git User
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Run Version Bumper
        id: bumper
        run: |
          python version_bumper.py patch
          git add setup.py requirements.in requirements.txt fastapi_stats_app/requirements.txt scheduler_app/requirements.txt
          git commit -m "chore(release): auto-version patch [skip ci]"
          git push origin HEAD:main

  # 4. Publish Shared Lib
  publish-shared-lib:
    name: Publish Shared Lib to PyPI
    needs: [validate, auto-version-patch]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip build twine
      - run: python -m build
      - name: Upload to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload --skip-existing dist/*

  # 5. Build Base Images (Conditional)
  build-base-images:
    name: Build Base Images
    needs: [check-changes, validate]
    if: |
      github.event_name == 'push' &&
      needs.validate.result == 'success' &&
      needs.check-changes.outputs.base == 'true'
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build Python Base
      - name: Build and Push Base Python
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.base-python
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/matplobbot-base-python:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build Worker Base (Heavy)
      - name: Build and Push Base Worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.base-worker
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/matplobbot-base-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 6. Build Service Images (Dependent on Validation + Base Image Logic)
  build-services:
    name: Build Service Images
    needs: [check-changes, validate, build-base-images]
    if: |
      always() &&
      github.event_name == 'push' &&
      needs.validate.result == 'success' &&
      (needs.build-base-images.result == 'success' || needs.build-base-images.result == 'skipped') &&
      (needs.check-changes.result == 'success')
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Maintenance Cleanup
        run: |
          docker image prune -af --filter "until=168h"
          docker container prune -f --filter "until=24h"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # WORKER (Uses Base Worker)
      - name: Build Worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/matplobbot-worker:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/matplobbot-worker:latest

      # BOT (Uses Base Python)
      - name: Build Bot
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.bot
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/matplobbot-bot:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/matplobbot-bot:latest

      # API (Uses Base Python)
      - name: Build API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./fastapi_stats_app/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/matplobbot-api:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/matplobbot-api:latest

      # SCHEDULER (Uses Base Python)
      - name: Build Scheduler
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./scheduler_app/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/matplobbot-scheduler:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/matplobbot-scheduler:latest

      - name: Soft Cleanup
        if: always()
        run: |
          docker image prune -af --filter "until=168h"
          docker container prune -f --filter "until=24h"

  # 7. Deploy
  trigger-deployment:
    name: Trigger Jenkins Deployment
    needs: [build-services]
    if: |
      always() &&
      github.event_name == 'push' &&
      needs.build-services.result == 'success'
    runs-on: self-hosted
    steps:
      - name: Trigger Jenkins Job via cURL
        run: |
          curl -X POST "${{ secrets.JENKINS_URL }}/job/matplobbot-deploy/buildWithParameters" \
            --user "${{ secrets.JENKINS_USER }}:${{ secrets.JENKINS_TOKEN }}" \
            --data-urlencode "BOT_IMAGE_TAG=${{ github.sha }}" \
            --data-urlencode "WORKER_IMAGE_TAG=${{ github.sha }}" \
            --data-urlencode "API_IMAGE_TAG=${{ github.sha }}" \
            --data-urlencode "SCHEDULER_IMAGE_TAG=${{ github.sha }}"
